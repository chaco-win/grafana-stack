apiVersion: 1

contactPoints:
  - orgId: 1
    name: Discord
    receivers:
      - uid: discord-receiver
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          title: |
            {{ if eq .Status "firing" }}🔥 ALERT{{ else }}✅ RESOLVED{{ end }}: {{ .CommonAnnotations.summary }}
          message: |
            {{ range .Alerts }}
            **{{ .Annotations.summary }}**
            {{ .Annotations.description }}
            Severity: `{{ .Labels.severity }}`
            {{ end }}
        disableResolveMessage: false
